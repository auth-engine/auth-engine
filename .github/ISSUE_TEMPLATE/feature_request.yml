name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved. Feature requests help shape the roadmap.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - auth-engine (API / backend)
        - auth-engine-dashboard (admin UI)
        - auth-engine-infra (compose / terraform / docs)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve? Who benefits?
      placeholder: Tenant admins cannot export audit logs for compliance reviews...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to contribute a PR?
      options:
        - Yes, I can open a PR
        - Maybe, I need guidance first
        - No, suggestion only
    validations:
      required: true
