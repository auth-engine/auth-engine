name: auth-engine · Lint, Typecheck, and Docker Build

# Manual only for now. To automate later, uncomment:
# on:
#   pull_request:
#     branches: [main]
#   push:
#     branches: [main]
on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint and typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install lint tools
        run: uv pip install ruff==0.4.4 mypy==1.10.0 types-redis

      - name: Ruff check
        run: uv run ruff check src

      - name: Ruff format
        run: uv run ruff format --check src

      - name: Mypy
        run: uv run mypy src
        env:
          PYTHONPATH: src

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
