# Pipeline: merge to main → 0-ci → 1-build-push → 4-deploy (EC2)
name: auth-engine · Lint and Typecheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint and typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: |
          if ! uv run ruff check src; then
            echo "::error::Ruff lint failed. Run: uv run ruff check src --fix"
            exit 1
          fi

      - name: Ruff format
        run: |
          if ! uv run ruff format --check --diff src; then
            echo ""
            echo "::error::Code is not formatted."
            echo "Fix locally with:"
            echo "  uv sync --extra dev"
            echo "  uv run ruff format src"
            echo "Then commit the formatted files."
            exit 1
          fi

      - name: Mypy
        run: uv run mypy src
        env:
          PYTHONPATH: src
