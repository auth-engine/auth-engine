repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format src
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy
        entry: bash -c 'PYTHONPATH=src uv run mypy src'
        language: system
        pass_filenames: false
        types: [python]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^alembic/|^\.env\.example$
